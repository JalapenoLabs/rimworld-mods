# Release workflow: build, validate, package, and upload a mod for Steam publishing.
#
# Runs on manual dispatch only. Calls the reusable build workflow first — the
# package job only proceeds if the build and all checks pass.
#
# The release folder is assembled carefully: ONLY the files explicitly copied
# below will end up in the zip, and therefore on Steam. Do not add anything
# that should not be public or distributed (source code, CI configs, editor
# files, etc.). When in doubt, leave it out.

name: Release Mod

env:
  FORCE_COLOR: 1

on:
  workflow_dispatch:
    inputs:
      mod:
        description: 'Mod to release (e.g. electricity-meter)'
        required: true
        type: string
      version:
        description: 'RimWorld version to package (e.g. 1.6)'
        required: true
        type: string
        default: '1.6'

jobs:
  # Run the full build + validation suite first.
  # The package job will not proceed if this fails.
  build:
    uses: ./.github/workflows/callable-build-mod.yml
    with:
      mod: ${{ inputs.mod }}
      version: ${{ inputs.version }}
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

  package:
    name: 'package ${{ inputs.mod }} @ ${{ inputs.version }}'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          submodules: recursive

      # ######################### #
      #    Validate User Inputs   #
      # ######################### #

      - name: Validate inputs
        run: |
          MOD_DIR="mods/${{ inputs.mod }}"
          VERSION_DIR="$MOD_DIR/${{ inputs.version }}"

          if [ ! -d "$MOD_DIR" ]; then
            echo "::error title=Invalid mod::Mod '${{ inputs.mod }}' not found — expected directory: $MOD_DIR"
            exit 1
          fi

          if [ ! -d "$VERSION_DIR" ]; then
            echo "::error title=Invalid version::Version '${{ inputs.version }}' not found — expected directory: $VERSION_DIR"
            exit 1
          fi

          echo "✔ mod:     ${{ inputs.mod }}"
          echo "✔ version: ${{ inputs.version }}"

      # ######################### #
      #     Assemble Release      #
      # ######################### #

      - name: Assemble release folder
        run: |
          MOD_DIR="mods/${{ inputs.mod }}"
          RELEASE_DIR="$MOD_DIR/release"

          # Wipe and recreate so no leftover files from a previous run sneak in.
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"

          # ── Files copied to the release folder go directly to Steam. ────────
          # Add or remove entries here with care. Never include: source code,
          # mod.csproj, Makefile, .github/, .vscode/, or any editor/CI config.
          # ────────────────────────────────────────────────────────────────────
          cp -r "$MOD_DIR/About"                 "$RELEASE_DIR/"
          cp -r "$MOD_DIR/${{ inputs.version }}" "$RELEASE_DIR/"

          # Optional — copy only if present
          [ -d "$MOD_DIR/Textures" ] && cp -r "$MOD_DIR/Textures" "$RELEASE_DIR/"
          [ -f "$MOD_DIR/README.md" ] && cp    "$MOD_DIR/README.md" "$RELEASE_DIR/"

          echo "Release folder contents:"
          find "$RELEASE_DIR" -type f | sort

      # ######################### #
      #          Package          #
      # ######################### #

      - name: Zip release
        run: |
          ZIP_NAME="${{ inputs.mod }}-${{ inputs.version }}.zip"

          # Zip from inside the release folder so the archive contains files
          # at its root with no wrapping subdirectory.
          cd "mods/${{ inputs.mod }}/release"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" .

          echo "Created: $ZIP_NAME"
          unzip -l "$GITHUB_WORKSPACE/$ZIP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: '${{ inputs.mod }}-${{ inputs.version }}'
          path: '${{ inputs.mod }}-${{ inputs.version }}.zip'
          if-no-files-found: error
