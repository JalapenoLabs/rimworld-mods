# Release workflow: build, validate, package, and upload a mod for Steam publishing.
#
# Runs on manual dispatch only. Calls the reusable build workflow first — the
# package job only proceeds if the build and all checks pass.
#
# The release folder is assembled carefully: ONLY the files explicitly copied
# in the "Assemble release folder" step will end up in the zip, and therefore
# on Steam. Do not add anything that should not be public or distributed
# (source code, CI configs, editor files, etc.). When in doubt, leave it out.

name: Release Mod

env:
  FORCE_COLOR: 1

on:
  workflow_dispatch:
    inputs:
      mod:
        description: 'Mod to release (e.g. electricity-meter)'
        required: true
        type: string
      version:
        description: 'RimWorld version to package (e.g. 1.6)'
        required: true
        type: string
        default: '1.6'

jobs:
  # Run the full build + validation suite first.
  # The package job will not proceed if this fails.
  build:
    uses: ./.github/workflows/callable-build-mod.yml
    with:
      mod: ${{ inputs.mod }}
      version: ${{ inputs.version }}
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

  package:
    name: 'package ${{ inputs.mod }} @ ${{ inputs.version }}'
    needs: build
    runs-on: ubuntu-latest

    env:
      MOD_DIR: mods/${{ inputs.mod }}
      VERSION_DIR: mods/${{ inputs.mod }}/${{ inputs.version }}
      RELEASE_DIR: mods/${{ inputs.mod }}/release
      ZIP_NAME: ${{ inputs.mod }}-${{ inputs.version }}.zip

    steps:
      # Full recursive checkout is required so the mod files and RimworldForCICD
      # submodule are both present for the build and packaging steps.
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          submodules: recursive

      # Catch bad inputs early before any file work begins.
      # Fails with a descriptive error if the mod directory or version folder
      # don't exist in the repository.
      - name: Validate inputs
        run: |
          if [ ! -d "$MOD_DIR" ]; then
            echo "::error title=Invalid mod::Mod '${{ inputs.mod }}' not found — expected directory: $MOD_DIR"
            exit 1
          fi

          if [ ! -d "$VERSION_DIR" ]; then
            echo "::error title=Invalid version::Version '${{ inputs.version }}' not found — expected directory: $VERSION_DIR"
            exit 1
          fi

          echo "✔ mod:     ${{ inputs.mod }}"
          echo "✔ version: ${{ inputs.version }}"

      # Wipe and rebuild the release folder from scratch so no leftover files
      # from a previous run can sneak into the archive.
      #
      # ── Files copied here go directly to Steam. ─────────────────────────────
      # Add or remove entries below with care. Never include: source code,
      # mod.csproj, Makefile, .github/, .vscode/, or any editor/CI config.
      # ────────────────────────────────────────────────────────────────────────
      - name: Assemble release folder
        run: |
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"

          cp -r "$MOD_DIR/About"       "$RELEASE_DIR/"
          cp -r "$VERSION_DIR"         "$RELEASE_DIR/"

          # Optional — copy only if present in this mod
          [ -d "$MOD_DIR/Textures" ] && cp -r "$MOD_DIR/Textures" "$RELEASE_DIR/"
          [ -f "$MOD_DIR/README.md" ] && cp    "$MOD_DIR/README.md" "$RELEASE_DIR/"

          echo "Release folder contents:"
          find "$RELEASE_DIR" -type f | sort

      # Zip from inside the release folder so the archive root contains the mod
      # files directly with no wrapping subdirectory.
      - name: Zip release
        run: |
          cd "$RELEASE_DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" .

          echo "Created: $ZIP_NAME"
          unzip -l "$GITHUB_WORKSPACE/$ZIP_NAME"

      # Upload the zip as a downloadable artifact on this workflow run.
      # This is the file that gets handed off to Steam Workshop publishing.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error
