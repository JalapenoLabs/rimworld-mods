# Reusable workflow: compile and validate a single RimWorld mod.
#
# Called by main.yml (and can be called by any other workflow) with:
#   mod:     the subdirectory name under mods/  (e.g. electricity-meter)
#   version: the RimWorld version folder to validate  (e.g. 1.6)
#
# All steps continue on failure so every check always runs and is reported.
# The final summary step prints a coloured pass/fail table and exits non-zero
# if anything failed.

name: Build Mod

env:
  FORCE_COLOR: 1
  RED: '\033[0;31m'
  GREEN: '\033[0;32m'
  YELLOW: '\033[1;33m'
  BOLD: '\033[1m'
  NC: '\033[0m'

on:
  workflow_call:
    inputs:
      mod:
        description: 'Mod directory name under mods/ (e.g. electricity-meter)'
        required: true
        type: string
      version:
        description: 'RimWorld version folder to validate (e.g. 1.6)'
        required: false
        type: string
        default: '1.6'
    secrets:
      SSH_PRIVATE_KEY:
        required: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      # ######################### #
      #        Setup Phase        #
      # ######################### #

      - name: Checkout (with submodules)
        id: checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          submodules: recursive

      - name: Setup .NET
        id: setup_dotnet
        continue-on-error: true
        if: steps.checkout.outcome == 'success'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Go
        id: setup_go
        continue-on-error: true
        if: steps.checkout.outcome == 'success'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # ######################### #
      #        Build Phase        #
      # ######################### #

      - name: Build ${{ inputs.mod }}
        id: build
        continue-on-error: true
        if: steps.setup_go.outcome == 'success' && steps.setup_dotnet.outcome == 'success'
        uses: magefile/mage-action@v4
        with:
          version: latest
          args: build ${{ inputs.mod }}

      # ######################### #
      #      Validation Phase     #
      # ######################### #

      # Recursively validate every .xml file under the version folder and About/.
      # Uses find + xmllint directly so glob expansion is handled by the shell,
      # not passed as a literal pattern to an action.
      - name: Validate XML
        id: validate_xml
        continue-on-error: true
        if: steps.checkout.outcome == 'success'
        run: |
          errors=0
          while IFS= read -r file; do
            if xmllint --noout "$file" 2>&1; then
              echo "  ✔ $file"
            else
              errors=$((errors + 1))
            fi
          done < <(find \
            "mods/${{ inputs.mod }}/${{ inputs.version }}" \
            "mods/${{ inputs.mod }}/About" \
            -name "*.xml" | sort)
          exit $errors

      # ######################### #
      #          Summary          #
      # ######################### #

      - name: Report results
        if: always()
        run: |
          failed=0

          report() {
            local label="$1"
            local outcome="$2"
            case "$outcome" in
              success) echo -e "  ${GREEN}✔  $label${NC}" ;;
              skipped) echo -e "  ${YELLOW}—  $label (skipped)${NC}" ;;
              *)       echo -e "  ${RED}✘  $label${NC}"; failed=1 ;;
            esac
          }

          echo ""
          echo -e "${BOLD}${{ inputs.mod }} @ ${{ inputs.version }}${NC}"
          echo "────────────────────────────────"
          report "Checkout"           "${{ steps.checkout.outcome }}"
          report "Setup .NET"         "${{ steps.setup_dotnet.outcome }}"
          report "Setup Go"           "${{ steps.setup_go.outcome }}"
          report "Build"              "${{ steps.build.outcome }}"
          report "Validate XML"        "${{ steps.validate_xml.outcome }}"
          echo ""

          exit $failed
